<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Assistant | AI First Nations</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--earth:#111009;--smoke:#1e1b10;--gold:#c9a24a;--mist:#7aab82;--cream:#ede5d4;--ember:#bf5417;--flame:#d9732e;}
body{background:var(--earth);color:var(--cream);font-family:"DM Sans",sans-serif;font-weight:300;min-height:100vh;}
#gate{position:fixed;inset:0;background:var(--earth);display:flex;align-items:center;justify-content:center;z-index:999;}
#content{display:none;}
.topnav{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:rgba(17,16,9,0.98);border-bottom:1px solid rgba(255,255,255,0.07);position:sticky;top:0;z-index:50;}
.brand{font-family:"Cormorant Garamond",serif;font-size:0.95rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:0.6rem;}
.brand img{height:38px;width:auto;}
.back{font-size:0.68rem;color:rgba(237,229,212,0.5);text-decoration:none;border:1px solid rgba(255,255,255,0.1);padding:0.35rem 0.9rem;transition:all 0.2s;}
.back:hover{color:var(--gold);border-color:var(--gold);}
.page-hdr{padding:2rem;background:linear-gradient(160deg,#1a0d1a,var(--smoke));border-bottom:1px solid rgba(255,255,255,0.07);}
.page-hdr h1{font-family:"Cormorant Garamond",serif;font-size:clamp(1.6rem,3vw,2.2rem);font-weight:300;color:#f8f3ea;margin-bottom:0.3rem;}
.page-hdr p{font-size:0.85rem;opacity:0.6;}
.layout{display:grid;grid-template-columns:280px 1fr;gap:0;min-height:calc(100vh - 120px);}
.sidebar{background:rgba(17,16,9,0.5);border-right:1px solid rgba(255,255,255,0.07);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:0.5rem;}
.sidebar-label{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;opacity:0.35;padding:0 0.3rem 0.5rem;margin-top:1rem;}
.sidebar-label:first-child{margin-top:0;}
.platform-btn{display:flex;align-items:center;gap:0.8rem;padding:0.8rem 1rem;border-radius:8px;cursor:pointer;border:1px solid transparent;background:none;color:var(--cream);opacity:0.65;text-align:left;width:100%;font-family:"DM Sans",sans-serif;font-size:0.85rem;transition:all 0.2s;}
.platform-btn:hover{background:rgba(255,255,255,0.05);opacity:1;}
.platform-btn.active{opacity:1;border-color:rgba(255,255,255,0.15);}
.platform-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.quick-label{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;opacity:0.35;padding:0 0.3rem 0.5rem;margin-top:1rem;}
.quick-btn{display:flex;align-items:center;gap:0.7rem;padding:0.65rem 1rem;border-radius:8px;cursor:pointer;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.02);color:rgba(237,229,212,0.7);text-align:left;width:100%;font-family:"DM Sans",sans-serif;font-size:0.78rem;transition:all 0.2s;line-height:1.4;}
.quick-btn:hover{background:rgba(255,255,255,0.06);color:var(--cream);border-color:rgba(255,255,255,0.15);}
.main{display:flex;flex-direction:column;height:calc(100vh - 120px);}
.platform-hdr{padding:1rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:1rem;flex-shrink:0;}
.platform-hdr-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.platform-hdr-name{font-family:"Cormorant Garamond",serif;font-size:1.2rem;font-weight:600;}
.platform-hdr-desc{font-size:0.72rem;opacity:0.55;margin-top:2px;}
.clr-btn{margin-left:auto;background:none;border:1px solid rgba(255,255,255,0.1);color:rgba(237,229,212,0.4);padding:0.3rem 0.8rem;font-size:0.65rem;cursor:pointer;font-family:"DM Sans",sans-serif;text-transform:uppercase;}
.msgs{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;}
.msg-u{align-self:flex-end;background:rgba(201,162,74,0.12);border:1px solid rgba(201,162,74,0.25);padding:0.8rem 1rem;border-radius:12px 2px 12px 12px;max-width:70%;font-size:0.87rem;line-height:1.7;}
.msg-a{align-self:flex-start;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);padding:1rem 1.2rem;border-radius:2px 12px 12px 12px;max-width:85%;font-size:0.87rem;line-height:1.85;white-space:pre-wrap;}
.copy-btn{display:inline-block;margin-top:0.8rem;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;background:rgba(201,162,74,0.1);border:1px solid rgba(201,162,74,0.25);color:var(--gold);padding:0.3rem 0.8rem;cursor:pointer;font-family:"DM Sans",sans-serif;}
.copy-btn:hover{background:rgba(201,162,74,0.2);}
.inp-area{padding:1rem 1.5rem;border-top:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
.inp-box{display:flex;gap:0.8rem;align-items:flex-end;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:0.8rem 1rem;}
.inp-box:focus-within{border-color:var(--gold);}
.inp-ta{flex:1;background:none;border:none;outline:none;color:var(--cream);font-size:0.87rem;line-height:1.6;resize:none;font-family:"DM Sans",sans-serif;max-height:100px;overflow-y:auto;}
.inp-ta::placeholder{color:rgba(237,229,212,0.3);}
.send-btn{width:36px;height:36px;border-radius:8px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0;transition:all 0.2s;}
.send-btn:disabled{cursor:not-allowed;}
.inp-hint{font-size:0.68rem;opacity:0.25;text-align:center;margin-top:0.6rem;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
@media(max-width:900px){.layout{grid-template-columns:1fr;}.sidebar{display:flex;flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid rgba(255,255,255,0.07);}.platform-btn{width:auto;}.main{height:auto;}}
</style>
</head>
<body>
<div id="gate"><p style="font-family:Cormorant Garamond,serif;font-size:1.1rem;color:#c9a24a;opacity:0.7;">🦅 Verifying access...</p></div>
<div id="content">
<nav class="topnav">
  <div class="brand"><img src="images/logo.jpg" alt="">AI First Nations</div>
  <a href="portal.html" class="back">← Portal</a>
</nav>
<div class="page-hdr">
  <div style="font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--ember);margin-bottom:0.5rem;">🔒 Secure · Marketing Suite</div>
  <h1>Virtual Marketing Assistant</h1>
  <p>Generate professional content for every platform — one click, ready to post.</p>
</div>
<div class="layout">
<div class="sidebar">
  <div class="sidebar-label">Platforms</div>
  <button class="platform-btn active" id="btn-linkedin" onclick="setPlatform('linkedin')">
    <div class="platform-icon" style="background:#0A66C2;">in</div>
    <div><div style="font-size:0.87rem;font-weight:500;">LinkedIn</div><div style="font-size:0.7rem;opacity:0.5;">Professional · B2B · Grants</div></div>
  </button>
  <button class="platform-btn" id="btn-facebook" onclick="setPlatform('facebook')">
    <div class="platform-icon" style="background:#1877F2;">f</div>
    <div><div style="font-size:0.87rem;font-weight:500;">Facebook</div><div style="font-size:0.7rem;opacity:0.5;">Community · Families · Local</div></div>
  </button>
  <button class="platform-btn" id="btn-instagram" onclick="setPlatform('instagram')">
    <div class="platform-icon" style="background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);">📷</div>
    <div><div style="font-size:0.87rem;font-weight:500;">Instagram</div><div style="font-size:0.7rem;opacity:0.5;">Visual · Drone · Youth</div></div>
  </button>
  <button class="platform-btn" id="btn-youtube" onclick="setPlatform('youtube')">
    <div class="platform-icon" style="background:#FF0000;">▶</div>
    <div><div style="font-size:0.87rem;font-weight:500;">YouTube</div><div style="font-size:0.7rem;opacity:0.5;">Video · Education · Showcase</div></div>
  </button>
  <button class="platform-btn" id="btn-press" onclick="setPlatform('press')">
    <div class="platform-icon" style="background:rgba(201,162,74,0.2);border:1px solid rgba(201,162,74,0.3);">📰</div>
    <div><div style="font-size:0.87rem;font-weight:500;">Press Release</div><div style="font-size:0.7rem;opacity:0.5;">Media · News · Announcements</div></div>
  </button>
  <button class="platform-btn" id="btn-email" onclick="setPlatform('email')">
    <div class="platform-icon" style="background:rgba(122,171,130,0.2);border:1px solid rgba(122,171,130,0.3);">✉️</div>
    <div><div style="font-size:0.87rem;font-weight:500;">Newsletter</div><div style="font-size:0.7rem;opacity:0.5;">Email · Stakeholders · Partners</div></div>
  </button>

  <div class="quick-label">Quick Generate</div>
  <button class="quick-btn" onclick="quickPost('Write a LinkedIn post announcing AI First Nations RMIT mangrove AI system achieving 97% species classification accuracy. Professional tone, include our CASA credentials and research partnership.')">🌿 Mangrove AI Achievement</button>
  <button class="quick-btn" onclick="quickPost('Write a post about AI First Nations environmental drone services protecting Country across Far North Queensland and the Torres Strait. Include our cultural governance approach.')">✈️ Drone Services Post</button>
  <button class="quick-btn" onclick="quickPost('Write a post celebrating AI First Nations being selected as Aboriginal Ambassador for the Australian Government Age Assurance Technology Trial. Professional and inspiring.')">🏛️ Government Ambassador</button>
  <button class="quick-btn" onclick="quickPost('Write a post about AI First Nations Junior Ranger and youth drone training programs. Inspiring, community-focused, celebrating Indigenous youth in technology.')">🎓 Youth Programs Post</button>
  <button class="quick-btn" onclick="quickPost('Write a post about the Jarramali Rock Art Documentation Project — how AI First Nations used drones to help preserve significant Aboriginal cultural heritage sites.')">🪨 Rock Art Heritage Post</button>
  <button class="quick-btn" onclick="quickPost('Write a weekly content calendar for AI First Nations with 5 post ideas across LinkedIn Facebook and Instagram covering our projects programs and cultural work.')">📅 Weekly Content Calendar</button>
</div>
