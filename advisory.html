<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI First Nations – Advisory Board</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
:root{--earth:#111009;--smoke:#1e1b10;--bark:#2e2910;--ember:#bf5417;--gold:#c9a24a;--mist:#7aab82;--cream:#ede5d4;--pale:#f8f3ea;}
body{background:var(--earth);color:var(--cream);font-family:'DM Sans',sans-serif;font-weight:300;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.top-nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:rgba(17,16,9,0.95);border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);}
.nav-back{font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--cream);opacity:0.55;text-decoration:none;border:1px solid rgba(255,255,255,0.12);padding:0.4rem 1rem;}
.nav-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--cream);opacity:0.8;}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:260px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.07);background:rgba(17,16,9,0.6);overflow-y:auto;padding:1.2rem 0.9rem;display:flex;flex-direction:column;gap:0.5rem;}
.sidebar-label{font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;opacity:0.35;padding:0 0.4rem 0.5rem;}
.advisor-btn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:14px 13px;cursor:pointer;text-align:left;transition:all 0.2s;width:100%;}
.advisor-btn:hover{background:rgba(255,255,255,0.06);}
.advisor-btn-inner{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.advisor-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.advisor-name{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--cream);font-weight:600;line-height:1.2;}
.advisor-role{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.5;margin-top:2px;}
.advisor-tagline{font-size:11px;color:rgba(237,229,212,0.55);line-height:1.5;font-style:italic;}
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{padding:1rem 1.8rem;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:70px;}
.chat-header-left{display:flex;align-items:center;gap:14px;}
.chat-header-icon{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.chat-header-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;}
.chat-header-tag{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.6;margin-top:3px;}
.clear-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(237,229,212,0.55);padding:5px 14px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;display:none;}
.messages{flex:1;overflow-y:auto;padding:1.8rem;}
.empty-state{text-align:center;padding:2rem 1rem 2.5rem;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:2rem;}
.empty-icon{font-size:44px;margin-bottom:14px;}
.empty-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;margin-bottom:6px;}
.empty-tagline{font-size:13px;opacity:0.55;max-width:380px;margin:0 auto;line-height:1.7;font-style:italic;}
.starters-label{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;opacity:0.35;margin-bottom:12px;}
.starters{display:flex;flex-direction:column;gap:7px;}
.starter-btn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:11px 15px;color:rgba(237,229,212,0.7);font-size:13px;cursor:pointer;text-align:left;line-height:1.5;transition:all 0.2s;font-family:'DM Sans',sans-serif;width:100%;}
.bubble-row{display:flex;margin-bottom:14px;gap:9px;align-items:flex-start;}
.bubble-row.user{justify-content:flex-end;}
.bubble-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px;}
.bubble-user-avatar{background:rgba(201,162,74,0.2);border:1px solid rgba(201,162,74,0.35);color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:14px;}
.bubble-text{max-width:78%;padding:13px 16px;font-size:14px;line-height:1.75;white-space:pre-wrap;}
.bubble-user{background:rgba(201,162,74,0.12);border:1px solid rgba(201,162,74,0.25);border-radius:14px 3px 14px 14px;color:var(--cream);}
.bubble-assistant{border-radius:3px 14px 14px 14px;}
.typing-dots{display:flex;gap:5px;align-items:center;padding:14px 18px;}
.dot{width:7px;height:7px;border-radius:50%;animation:dotPulse 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes dotPulse{0%,80%,100%{opacity:0.3;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}
.error-msg{background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);border-radius:9px;padding:11px 15px;font-size:13px;color:#e74c3c;margin-bottom:14px;}
.input-area{padding:1rem 1.8rem 1.2rem;border-top:1px solid rgba(255,255,255,0.07);background:rgba(17,16,9,0.5);flex-shrink:0;}
.input-box{display:flex;gap:10px;align-items:flex-end;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:13px;padding:10px 14px;}
#userInput{flex:1;background:none;border:none;outline:none;color:var(--cream);font-size:14px;line-height:1.6;resize:none;font-family:'DM Sans',sans-serif;font-weight:300;max-height:100px;overflow-y:auto;}
#userInput::placeholder{color:rgba(237,229,212,0.3);}
#sendBtn{width:36px;height:36px;border-radius:9px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all 0.2s;flex-shrink:0;background:rgba(255,255,255,0.07);color:rgba(237,229,212,0.4);}
#sendBtn:disabled{cursor:not-allowed;}
.input-hint{font-size:10px;opacity:0.25;text-align:center;margin-top:7px;letter-spacing:0.06em;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-brand">AI First Nations</div>
  <div class="nav-title">Advisory Board</div>
  <a href="index.html" class="nav-back">← Back to Site</a>
</nav>
<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-label">Select Advisor</div>
  </div>
  <div class="chat-panel">
    <div class="chat-header" id="chatHeader">
      <div class="chat-header-left">
        <div class="chat-header-icon" id="headerIcon"></div>
        <div>
          <div class="chat-header-name" id="headerName"></div>
          <div class="chat-header-tag" id="headerTag"></div>
        </div>
      </div>
      <button class="clear-btn" id="clearBtn" onclick="clearChat()">Clear chat</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-box" id="inputBox">
        <textarea id="userInput" rows="1" placeholder="Ask your advisor anything about AI First Nations…"></textarea>
        <button id="sendBtn" disabled onclick="sendMessage()">↑</button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>
</div>
