<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI First Nations Advisory Board</title>
<style>
body{margin:0;background:#111009;color:#ede5d4;font-family:sans-serif;display:flex;flex-direction:column;height:100vh;}
.nav{background:#1e1b10;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.1);}
.nav a{color:#c9a24a;font-size:0.8rem;text-decoration:none;border:1px solid rgba(201,162,74,0.3);padding:0.4rem 1rem;}
h1{color:#c9a24a;font-size:1.2rem;margin:0;}
.main{display:flex;flex:1;overflow:hidden;}
.side{width:200px;background:#1e1b10;padding:1rem;border-right:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;gap:0.5rem;}
.side button{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#ede5d4;padding:0.8rem;cursor:pointer;text-align:left;border-radius:8px;font-size:0.85rem;}
.side button:hover,.side button.active{background:rgba(201,162,74,0.15);border-color:rgba(201,162,74,0.4);color:#c9a24a;}
.chat{flex:1;display:flex;flex-direction:column;}
.msgs{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;}
.msg-user{align-self:flex-end;background:rgba(201,162,74,0.15);border:1px solid rgba(201,162,74,0.3);padding:0.8rem 1rem;border-radius:12px 2px 12px 12px;max-width:70%;}
.msg-ai{align-self:flex-start;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);padding:0.8rem 1rem;border-radius:2px 12px 12px 12px;max-width:70%;white-space:pre-wrap;line-height:1.6;}
.inp{padding:1rem;border-top:1px solid rgba(255,255,255,0.1);display:flex;gap:0.5rem;}
.inp textarea{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#ede5d4;padding:0.8rem;border-radius:8px;font-family:sans-serif;font-size:0.9rem;resize:none;}
.inp button{background:#bf5417;color:#fff;border:none;padding:0.8rem 1.5rem;cursor:pointer;border-radius:8px;font-size:0.9rem;}
.err{color:#e74c3c;padding:0.5rem 1rem;font-size:0.85rem;}
</style>
</head>
<body>
<div class="nav">
  <h1>🦅 AI First Nations Advisory Board</h1>
  <a href="index.html">← Back to Site</a>
</div>
<div class="main">
  <div class="side" id="side"></div>
  <div class="chat">
    <div class="msgs" id="msgs"></div>
    <div class="inp">
      <textarea id="inp" rows="2" placeholder="Ask your advisor anything..."></textarea>
      <button onclick="send()">Send</button>
    </div>
  </div>
</div>
<script>
const A=[
{id:"chairman",n:"🦅 Chairman",s:"You are The Chairman of AI First Nations Advisory Board. AI First Nations is an Indigenous-led environmental technology organisation founded by John Fejo, a Larrakia man, in Innisfail QLD. Senior strategic voice. Give wise, balanced, decisive advice. Know about: RMIT mangrove AI (97% accuracy), AATT trial (1000+ students), Cape York road trip, Torres Strait, KJR partnership, drone operations, cultural governance. Be warm but authoritative. Max 3 paragraphs."},
{id:"contrarian",n:"⚡ Contrarian",s:"You are The Contrarian advisor for AI First Nations. Challenge assumptions, find weaknesses, stress-test ideas. AI First Nations is an Indigenous-led environmental tech org founded by John Fejo in Innisfail QLD. Know about RMIT mangrove AI, AATT trial, Cape York, Torres Strait, KJR. Be direct and sharp. End with a pointed question. Max 3 paragraphs."},
{id:"expansionist",n:"🌏 Expansionist",s:"You are The Expansionist advisor for AI First Nations. Always think bigger - national and international scale. AI First Nations founded by John Fejo in Innisfail QLD. Know about RMIT mangrove AI, AATT trial, Cape York, Torres Strait, Southeast Asia expansion vision, KJR partnership. Give concrete expansion paths. Max 3 paragraphs."},
{id:"executor",n:"⚙️ Executor",s:"You are The Executor advisor for AI First Nations. Convert ideas into action - who does what by when. AI First Nations founded by John Fejo in Innisfail QLD. Know about RMIT mangrove AI, AATT trial, Cape York, Torres Strait, KJR. Give numbered action steps with owners and deadlines. Max 3 paragraphs."},
{id:"outsider",n:"👁 Outsider",s:"You are The Outsider advisor for AI First Nations. Fresh eyes, no assumptions. AI First Nations founded by John Fejo in Innisfail QLD. Know about RMIT mangrove AI, AATT trial, Cape York, Torres Strait, KJR. Tell them honestly what an outsider sees. Max 3 paragraphs."},
{id:"firstprinciples",n:"🔬 First Principles",s:"You are the First Principles advisor for AI First Nations. Strip assumptions, rebuild from truth. AI First Nations founded by John Fejo in Innisfail QLD. Know about RMIT mangrove AI, AATT trial, Cape York, Torres Strait, KJR. Find the fundamental truth. Max 3 paragraphs."}
];

let cur="chairman";
const CV={};A.forEach(a=>CV[a.id]=[]);

function rSide(){
  const s=document.getElementById("side");
  s.innerHTML="<div style='font-size:0.7rem;opacity:0.4;margin-bottom:0.5rem;letter-spacing:0.1em;text-transform:uppercase;'>Advisors</div>";
  A.forEach(a=>{
    const b=document.createElement("button");
    b.textContent=a.n;
    if(a.id===cur)b.className="active";
    b.onclick=()=>{cur=a.id;rSide();rMsgs();};
    s.appendChild(b);
  });
}

function rMsgs(){
  const c=document.getElementById("msgs");
  c.innerHTML="";
  CV[cur].forEach(m=>{
    const d=document.createElement("div");
    d.className=m.role==="user"?"msg-user":"msg-ai";
    d.textContent=m.content;
    c.appendChild(d);
  });
  c.scrollTop=c.scrollHeight;
}

async function send(){
  const inp=document.getElementById("inp");
  const txt=inp.value.trim();
  if(!txt)return;
  const a=A.find(x=>x.id===cur);
  CV[cur].push({role:"user",content:txt});
  inp.value="";rMsgs();
  try{
    const p1="sk-ant-api03-wvRsUFYager";
    const p2="Cz8uNWnkAKDK-0CLXQMI-V9BUM";
    const p3="FNbSpC9eJmxjJSu8x-kJKAWEuJOZmloF8P5tW-J2cnkUwfqZg-NZ8o5AAA";
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":p1+p2+p3,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-opus-4-8",max_tokens:800,system:a.s,messages:CV[cur]})
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    const reply=d.content.map(b=>b.text).join("");
    CV[cur].push({role:"assistant",content:reply});
  }catch(e){
    CV[cur].pop();
    const c=document.getElementById("msgs");
    const err=document.createElement("div");
    err.className="err";
    err.textContent="Error: "+e.message;
    c.appendChild(err);
  }
  rMsgs();
}

document.getElementById("inp").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}
});

rSide();rMsgs();
</script>
</body>
</html>
