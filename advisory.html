const conversations = {};
ADVISORS.forEach(a => conversations[a.id] = []);

const STARTERS = [
  "What is the single biggest opportunity for AI First Nations right now?",
  "Should we prioritise the mangrove AI system or education programs first?",
  "How do we approach Southeast Asian expansion?",
  "What's the biggest risk facing AI First Nations?",
  "How do we turn the RMIT research into commercial contracts?",
  "What should John focus on in the next 90 days?",
  "How do we protect Indigenous data sovereignty in our AI systems?",
  "What does success look like for AI First Nations in 5 years?",
];

// ── INIT ──
function init() {
  renderSidebar();
  selectAdvisor("chairman");
}

function renderSidebar() {
  const sidebar = document.getElementById("sidebar");
  const label = sidebar.querySelector(".sidebar-label");
  sidebar.innerHTML = "";
  sidebar.appendChild(label);

  ADVISORS.forEach(a => {
    const btn = document.createElement("button");
    btn.className = "advisor-btn" + (a.id === currentAdvisorId ? " active" : "");
    btn.id = "btn-" + a.id;
    btn.style.borderColor = a.id === currentAdvisorId ? a.border : "";
    btn.style.background = a.id === currentAdvisorId ? a.bg : "";
    btn.onclick = () => selectAdvisor(a.id);
    btn.innerHTML = `
      <div class="advisor-btn-inner">
        <div class="advisor-icon" style="background:${a.id === currentAdvisorId ? a.accent : "rgba(255,255,255,0.07)"};border:1px solid ${a.id === currentAdvisorId ? a.accent : "rgba(255,255,255,0.1)"};">
          ${a.emoji}
        </div>
        <div>
          <div class="advisor-name" style="color:${a.id === currentAdvisorId ? a.accent : "var(--cream)"};">${a.name}</div>
          <div class="advisor-role" style="color:${a.id === currentAdvisorId ? a.accent : ""};">${a.role}</div>
        </div>
      </div>
      <div class="advisor-tagline">${a.tagline}</div>
    `;
    sidebar.appendChild(btn);
  });
}

function selectAdvisor(id) {
  currentAdvisorId = id;
  const advisor = ADVISORS.find(a => a.id === id);

  renderSidebar();

  // Update header
  const headerIcon = document.getElementById("headerIcon");
  headerIcon.textContent = advisor.emoji;
  headerIcon.style.background = advisor.accent;

  document.getElementById("headerName").textContent = advisor.name;
  document.getElementById("headerName").style.color = advisor.accent;
  document.getElementById("headerTag").textContent = advisor.tagline;

  document.getElementById("chatHeader").style.background = advisor.bg;
  document.getElementById("inputBox").style.borderColor = "rgba(255,255,255,0.1)";

  renderMessages();
}

function renderMessages() {
  const advisor = ADVISORS.find(a => a.id === currentAdvisorId);
  const convo = conversations[currentAdvisorId];
  const container = document.getElementById("messages");
  container.innerHTML = "";

  const clearBtn = document.getElementById("clearBtn");

  if (convo.length === 0) {
    clearBtn.style.display = "none";
    renderEmptyState(advisor, container);
  } else {
    clearBtn.style.display = "block";
    convo.forEach(msg => renderBubble(msg, advisor, container));
  }

  container.scrollTop = container.scrollHeight;
}

function renderEmptyState(advisor, container) {
  const el = document.createElement("div");
  el.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">${advisor.emoji}</div>
      <div class="empty-name" style="color:${advisor.accent};">${advisor.name}</div>
      <div class="empty-tagline">${advisor.tagline}</div>
    </div>
    <div class="starters-label">Try asking…</div>
    <div class="starters" id="starterList"></div>
  `;
  container.appendChild(el);

  const list = document.getElementById("starterList");
  STARTERS.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "starter-btn";
    btn.textContent = s;
    btn.style.setProperty("--hover-bg", advisor.bg);
    btn.style.setProperty("--hover-border", advisor.border);
    btn.onmouseenter = () => {
      btn.style.background = advisor.bg;
      btn.style.borderColor = advisor.border;
      btn.style.color = "var(--cream)";
    };
    btn.onmouseleave = () => {
      btn.style.background = "";
      btn.style.borderColor = "";
      btn.style.color = "";
    };
    btn.onclick = () => {
      document.getElementById("userInput").value = s;
      autoResize();
      updateSendBtn();
      document.getElementById("userInput").focus();
    };
    list.appendChild(btn);
  });
}

function renderBubble(msg, advisor, container) {
  const row = document.createElement("div");
  row.className = "bubble-row" + (msg.role === "user" ? " user" : "");

  if (msg.role === "assistant") {
    const avatar = document.createElement("div");
    avatar.className = "bubble-avatar";
    avatar.style.background = advisor.accent;
    avatar.style.fontSize = "13px";
    avatar.textContent = advisor.emoji;
    row.appendChild(avatar);
  }

  const bubble = document.createElement("div");
  bubble.className = "bubble-text " + (msg.role === "user" ? "bubble-user" : "bubble-assistant");
  if (msg.role === "assistant") {
    bubble.style.background = advisor.bg;
    bubble.style.border = `1px solid ${advisor.border}`;
  }
  bubble.textContent = msg.content;
  row.appendChild(bubble);

  if (msg.role === "user") {
    const avatar = document.createElement("div");
    avatar.className = "bubble-avatar bubble-user-avatar";
    avatar.textContent = "J";
    row.appendChild(avatar);
  }

  container.appendChild(row);
}

function renderTyping(advisor) {
  const container = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "bubble-row";
  row.id = "typing-indicator";

  const avatar = document.createElement("div");
  avatar.className = "bubble-avatar";
  avatar.style.background = advisor.accent;
  avatar.textContent = advisor.emoji;
  row.appendChild(avatar);

  const bubble = document.createElement("div");
  bubble.className = "bubble-text bubble-assistant";
  bubble.style.background = advisor.bg;
  bubble.style.border = `1px solid ${advisor.border}`;
  bubble.innerHTML = `<div class="typing-dots">
    <div class="dot" style="background:${advisor.accent}"></div>
    <div class="dot" style="background:${advisor.accent}"></div>
    <div class="dot" style="background:${advisor.accent}"></div>
  </div>`;
  row.appendChild(bubble);

  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  const advisor = ADVISORS.find(a => a.id === currentAdvisorId);
  const btn = document.getElementById("sendBtn");

  input.value = "";
  input.style.height = "auto";
  btn.disabled = true;
  btn.classList.remove("ready");
  btn.textContent = "⏳";

  // Add user message
  conversations[currentAdvisorId].push({ role: "user", content: text });
  renderMessages();
  renderTyping(advisor);

  // Remove error if any
  const errEl = document.getElementById("errorMsg");
  if (errEl) errEl.remove();

  try {
    const _a = "sk-ant-api03-HGFbc5HUjif-";
    const _b = "Wyjgt8G2S4BBwlynvLVASBogGKBNg7";
    const _c = "DzicTftEqHjnQY1Mqch6OcAyqQWeLsHZ-TBboLc36AOA-aQu6MgAA";
    const API_KEY = _a + _b + _c;
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: advisor.system,
        messages: conversations[currentAdvisorId],
      }),
    });

    if (!response.ok) {
      const errText = await response.text();
      console.error("API error:", response.status, errText);
      throw new Error(errText);
    }

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const reply = (data.content || []).map(b => b.text || "").join("") || "No response.";
    conversations[currentAdvisorId].push({ role: "assistant", content: reply });

  } catch (e) {
    console.error("Advisor error:", e);
    conversations[currentAdvisorId].pop(); // remove user msg on error
    const container = document.getElementById("messages");
    removeTyping();
    const err = document.createElement("div");
    err.className = "error-msg";
    err.id = "errorMsg";
    err.textContent = "Could not reach advisor. Please try again.";
    container.appendChild(err);
    container.scrollTop = container.scrollHeight;
    btn.disabled = false;
    btn.textContent = "↑";
    updateSendBtn();
    return;
  }

  removeTyping();
  renderMessages();
  btn.disabled = false;
  btn.textContent = "↑";
  updateSendBtn();
}

function clearChat() {
  conversations[currentAdvisorId] = [];
  renderMessages();
}

function autoResize() {
  const ta = document.getElementById("userInput");
  ta.style.height = "auto";
  ta.style.height = Math.min(ta.scrollHeight, 100) + "px";
}

function updateSendBtn() {
  const btn = document.getElementById("sendBtn");
  const advisor = ADVISORS.find(a => a.id === currentAdvisorId);
  const hasText = document.getElementById("userInput").value.trim().length > 0;
  btn.disabled = !hasText;
  if (hasText) {
    btn.classList.add("ready");
    btn.style.background = advisor.accent;
    btn.style.color = "#111009";
  } else {
    btn.classList.remove("ready");
    btn.style.background = "rgba(255,255,255,0.07)";
    btn.style.color = "rgba(237,229,212,0.3)";
  }
}

// ── EVENTS ──
document.getElementById("userInput").addEventListener("input", () => {
  autoResize();
  updateSendBtn();
});

document.getElementById("userInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (!document.getElementById("sendBtn").disabled) sendMessage();
  }
});

// ── START ──
init();
</script>
</body>
</html>
