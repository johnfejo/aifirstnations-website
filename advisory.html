<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI First Nations - Advisory Board</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
:root{--earth:#111009;--smoke:#1e1b10;--gold:#c9a24a;--mist:#7aab82;--cream:#ede5d4;--ember:#bf5417;}
body{background:var(--earth);color:var(--cream);font-family:"DM Sans",sans-serif;font-weight:300;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;background:rgba(17,16,9,0.97);border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
.brand{font-family:"Cormorant Garamond",serif;font-size:1rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);}
.back{font-size:0.72rem;color:var(--cream);opacity:0.55;text-decoration:none;border:1px solid rgba(255,255,255,0.12);padding:0.4rem 1rem;transition:all 0.2s;}
.back:hover{opacity:1;color:var(--gold);border-color:var(--gold);}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:250px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.07);overflow-y:auto;padding:1rem 0.8rem;display:flex;flex-direction:column;gap:0.5rem;}
.slabel{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;opacity:0.35;padding:0 0.3rem 0.5rem;}
.abtn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:13px 12px;cursor:pointer;text-align:left;width:100%;transition:all 0.2s;}
.arow{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.aico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.aname{font-family:"Cormorant Garamond",serif;font-size:14px;color:var(--cream);font-weight:600;}
.arole{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.5;margin-top:1px;}
.atag{font-size:11px;color:rgba(237,229,212,0.5);line-height:1.4;font-style:italic;}
.cpanel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.cheader{padding:0.9rem 1.6rem;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:66px;}
.cheader-l{display:flex;align-items:center;gap:12px;}
.chico{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.chname{font-family:"Cormorant Garamond",serif;font-size:1.15rem;font-weight:600;}
.chtag{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.6;margin-top:2px;}
.clrbtn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:rgba(237,229,212,0.5);padding:5px 12px;font-size:11px;cursor:pointer;font-family:"DM Sans",sans-serif;display:none;}
.msgs{flex:1;overflow-y:auto;padding:1.6rem;display:flex;flex-direction:column;gap:0.8rem;}
.estate{text-align:center;padding:2rem 1rem;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:1rem;}
.eico{font-size:48px;margin-bottom:1rem;}
.ename{font-family:"Cormorant Garamond",serif;font-size:1.4rem;margin-bottom:0.5rem;}
.etag{font-size:13px;opacity:0.55;max-width:360px;margin:0 auto;line-height:1.6;font-style:italic;}
.slbl{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;opacity:0.35;margin-bottom:10px;margin-top:1.5rem;}
.slist{display:flex;flex-direction:column;gap:6px;}
.sbtn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px;color:rgba(237,229,212,0.7);font-size:12px;cursor:pointer;text-align:left;line-height:1.5;font-family:"DM Sans",sans-serif;width:100%;transition:all 0.2s;}
.brow{display:flex;gap:8px;align-items:flex-start;}
.brow.user{justify-content:flex-end;}
.bav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px;}
.buav{background:rgba(201,162,74,0.2);border:1px solid rgba(201,162,74,0.35);color:var(--gold);font-family:"Cormorant Garamond",serif;}
.btxt{max-width:75%;padding:12px 15px;font-size:13px;line-height:1.75;white-space:pre-wrap;}
.buser{background:rgba(201,162,74,0.12);border:1px solid rgba(201,162,74,0.25);border-radius:13px 3px 13px 13px;color:var(--cream);}
.basst{border-radius:3px 13px 13px 13px;}
.dots{display:flex;gap:5px;align-items:center;padding:13px 16px;}
.dot{width:7px;height:7px;border-radius:50%;animation:dp 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes dp{0%,80%,100%{opacity:0.3;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}
.errmsg{background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#e74c3c;}
.iarea{padding:0.9rem 1.6rem 1.1rem;border-top:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
.ibox{display:flex;gap:9px;align-items:flex-end;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:9px 13px;transition:border-color 0.2s;}
.ibox:focus-within{border-color:var(--gold);}
#ui{flex:1;background:none;border:none;outline:none;color:var(--cream);font-size:13px;line-height:1.6;resize:none;font-family:"DM Sans",sans-serif;font-weight:300;max-height:90px;overflow-y:auto;}
#ui::placeholder{color:rgba(237,229,212,0.3);}
#sb{width:34px;height:34px;border-radius:8px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;background:rgba(255,255,255,0.07);color:rgba(237,229,212,0.4);transition:all 0.2s;}
#sb:disabled{cursor:not-allowed;}
.ihint{font-size:10px;opacity:0.25;text-align:center;margin-top:6px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
@media(max-width:700px){.layout{flex-direction:column;}.sidebar{width:100%;flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid rgba(255,255,255,0.07);}.abtn{width:calc(50% - 4px);}.atag{display:none;}.cpanel{height:70vh;}}
</style>
</head>
<body>
<nav class="topnav">
  <div class="brand">AI First Nations</div>
  <div style="font-family:Cormorant Garamond,serif;font-size:1rem;opacity:0.7;">Advisory Board</div>
  <a href="index.html" class="back">Back to Site</a>
</nav>
<div class="layout">
  <div class="sidebar" id="SB"><div class="slabel">Select Advisor</div></div>
  <div class="cpanel">
    <div class="cheader" id="CH">
      <div class="cheader-l">
        <div class="chico" id="HI"></div>
        <div><div class="chname" id="HN"></div><div class="chtag" id="HT"></div></div>
      </div>
      <button class="clrbtn" id="CB" onclick="clr()">Clear</button>
    </div>
    <div class="msgs" id="MS"></div>
    <div class="iarea">
      <div class="ibox">
        <textarea id="ui" rows="1" placeholder="Ask your advisor anything about AI First Nations..."></textarea>
        <button id="sb" disabled onclick="send()">&#8593;</button>
      </div>
      <div class="ihint">Enter to send - Shift+Enter for new line</div>
    </div>
  </div>
</div>
<script>
const AV=[
{id:"chairman",n:"The Chairman",e:"🦅",ac:"#C9A24A",bg:"rgba(125,102,8,0.15)",br:"rgba(201,162,74,0.4)",role:"Strategic Authority",tag:"The senior voice — weighs everything, makes the call",sys:"You are The Chairman of the AI First Nations Advisory Board. AI First Nations is an Indigenous-led environmental technology organisation founded by John Fejo, a Larrakia man, in Innisfail, Far North Queensland. You are the most senior voice. Be wise, balanced, decisive. Key knowledge: RMIT mangrove AI (97% accuracy, 98.96% binary detection, EfficientNet-B0), AATT Government trial (Aboriginal Ambassador, 1000+ students, 5 states), Cape York road trip (Cooktown to Mapoon), Torres Strait marine debris (Salty Monkeys, KJR), Jarramali rock art, John Fejo background (Larrakia man, drone pilot RePL/ReOC, Head Ranger Coordinator, cultural ambassador, minister), 3 pillars (Creation Connection Contribution), growth phases. Style: Gravitas and warmth, clear decisive recommendation, 3-4 paragraphs."},
{id:"contrarian",n:"The Contrarian",e:"⚡",ac:"#E74C3C",bg:"rgba(192,57,43,0.12)",br:"rgba(192,57,43,0.35)",role:"Devil's Advocate",tag:"Finds the flaw before your competitors do",sys:"You are The Contrarian advisor for AI First Nations, founded by John Fejo, a Larrakia man, in Innisfail QLD. Challenge assumptions, find weaknesses, stress-test ideas. Know about RMIT mangrove AI, AATT trial, Cape York, Torres Strait, KJR. Be direct and sharp. End with a pointed question. Max 3 paragraphs."},
{id:"expansionist",n:"The Expansionist",e:"🌏",ac:"#27AE60",bg:"rgba(30,132,73,0.12)",br:"rgba(39,174,96,0.35)",role:"Growth Strategist",tag:"Always thinking bigger, broader, bolder",sys:"You are The Expansionist advisor for AI First Nations, founded by John Fejo in Innisfail QLD. Always think bigger - national and international. Know about RMIT mangrove AI, AATT trial, Cape York, Torres Strait, Southeast Asia expansion, KJR. Give concrete expansion paths. Max 3 paragraphs."},
{id:"executor",n:"The Executor",e:"⚙️",ac:"#CA6F1E",bg:"rgba(147,81,22,0.12)",br:"rgba(202,111,30,0.35)",role:"Action Strategist",tag:"Turns vision into action — who, what, by when",sys:"You are The Executor advisor for AI First Nations, founded by John Fejo in Innisfail QLD. Pure execution - who does what by when. Know about RMIT mangrove AI, AATT trial, Cape York, Torres Strait, KJR. Give numbered action steps. Max 3 paragraphs."},
{id:"outsider",n:"The Outsider",e:"👁",ac:"#8E44AD",bg:"rgba(108,52,131,0.12)",br:"rgba(142,68,173,0.35)",role:"Fresh Perspective",tag:"No assumptions — completely fresh eyes",sys:"You are The Outsider advisor for AI First Nations, founded by John Fejo in Innisfail QLD. Fresh eyes, no assumptions. Know about RMIT mangrove AI, AATT trial, Cape York, Torres Strait, KJR. Tell them what an outsider sees honestly. Max 3 paragraphs."},
{id:"firstprinciples",n:"First Principles",e:"🔬",ac:"#2E86C1",bg:"rgba(26,82,118,0.12)",br:"rgba(46,134,193,0.35)",role:"Systems Thinker",tag:"Strips everything back and rebuilds from truth",sys:"You are the First Principles advisor for AI First Nations, founded by John Fejo in Innisfail QLD. Strip assumptions, rebuild from fundamental truths. Know about RMIT mangrove AI, AATT trial, Cape York, Torres Strait, KJR. Find the core truth. Max 3 paragraphs."}
];

const ST=["What is the biggest opportunity for AI First Nations right now?","Should we prioritise the mangrove AI or education programs first?","How do we approach Southeast Asian expansion?","What is the biggest risk facing AI First Nations?","How do we turn the RMIT research into commercial contracts?","What should John focus on in the next 90 days?","How do we protect Indigenous data sovereignty?","What does success look like in 5 years?"];

let cid="chairman";
const CV={};AV.forEach(a=>CV[a.id]=[]);

function rSB(){
  const sb=document.getElementById("SB");
  const lbl=sb.querySelector(".slabel");
  sb.innerHTML="";sb.appendChild(lbl);
  AV.forEach(a=>{
    const b=document.createElement("button");
    b.className="abtn"+(a.id===cid?" active":"");
    b.style.borderColor=a.id===cid?a.br:"";
    b.style.background=a.id===cid?a.bg:"";
    b.onclick=()=>{cid=a.id;rSB();rMsgs();};
    b.innerHTML='<div class="arow"><div class="aico" style="background:'+(a.id===cid?a.ac:"rgba(255,255,255,0.07)")+';border:1px solid '+(a.id===cid?a.ac:"rgba(255,255,255,0.1)")+'">'+a.e+'</div><div><div class="aname" style="color:'+(a.id===cid?a.ac:"var(--cream)")+'">'+a.n+'</div><div class="arole">'+a.role+'</div></div></div><div class="atag">'+a.tag+'</div>';
    sb.appendChild(b);
  });
}

function rMsgs(){
  const a=AV.find(x=>x.id===cid);
  const cv=CV[cid];
  const c=document.getElementById("MS");
  c.innerHTML="";
  document.getElementById("CB").style.display=cv.length?"block":"none";
  document.getElementById("CH").style.background=a.bg;
  document.getElementById("HI").textContent=a.e;
  document.getElementById("HI").style.background=a.ac;
  document.getElementById("HN").textContent=a.n;
  document.getElementById("HN").style.color=a.ac;
  document.getElementById("HT").textContent=a.tag;
  if(cv.length===0){
    const el=document.createElement("div");
    el.innerHTML='<div class="estate"><div class="eico">'+a.e+'</div><div class="ename" style="color:'+a.ac+'">'+a.n+'</div><div class="etag">'+a.tag+'</div></div><div class="slbl">Try asking...</div><div class="slist" id="SL"></div>';
    c.appendChild(el);
    const sl=document.getElementById("SL");
    ST.forEach(s=>{
      const btn=document.createElement("button");
      btn.className="sbtn";btn.textContent=s;
      btn.onmouseenter=()=>{btn.style.background=a.bg;btn.style.borderColor=a.br;btn.style.color="var(--cream)";};
      btn.onmouseleave=()=>{btn.style.background="";btn.style.borderColor="";btn.style.color="";};
      btn.onclick=()=>{document.getElementById("ui").value=s;rz();updB();document.getElementById("ui").focus();};
      sl.appendChild(btn);
    });
  } else {
    cv.forEach(m=>{
      const r=document.createElement("div");
      r.className="brow"+(m.role==="user"?" user":"");
      if(m.role==="assistant"){const av=document.createElement("div");av.className="bav";av.style.background=a.ac;av.textContent=a.e;r.appendChild(av);}
      const b=document.createElement("div");
      b.className="btxt "+(m.role==="user"?"buser":"basst");
      if(m.role==="assistant"){b.style.background=a.bg;b.style.border="1px solid "+a.br;}
      b.textContent=m.content;r.appendChild(b);
      if(m.role==="user"){const av=document.createElement("div");av.className="bav buav";av.textContent="J";r.appendChild(av);}
      c.appendChild(r);
    });
  }
  c.scrollTop=c.scrollHeight;
}

async function send(){
  const inp=document.getElementById("ui");
  const txt=inp.value.trim();if(!txt)return;
  const a=AV.find(x=>x.id===cid);
  const btn=document.getElementById("sb");
  inp.value="";inp.style.height="auto";
  btn.disabled=true;btn.textContent="...";
  CV[cid].push({role:"user",content:txt});
  rMsgs();
  const c=document.getElementById("MS");
  const tr=document.createElement("div");tr.className="brow";tr.id="TI";
  const tav=document.createElement("div");tav.className="bav";tav.style.background=a.ac;tav.textContent=a.e;tr.appendChild(tav);
  const tb=document.createElement("div");tb.className="btxt basst";tb.style.background=a.bg;tb.style.border="1px solid "+a.br;
  tb.innerHTML='<div class="dots"><div class="dot" style="background:'+a.ac+'"></div><div class="dot" style="background:'+a.ac+'"></div><div class="dot" style="background:'+a.ac+'"></div></div>';
  tr.appendChild(tb);c.appendChild(tr);c.scrollTop=c.scrollHeight;
  try{
    const k="sk-ant-api03-wvRsUFYager".concat("Cz8uNWnkAKDK-0CLXQMI-V9BUM").concat("FNbSpC9eJmxjJSu8x-kJKAWEuJOZmloF8P5tW-J2cnkUwfqZg-NZ8o5AAA");
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-opus-4-8",max_tokens:800,system:a.sys,messages:CV[cid]})
    });
    if(!r.ok){const t=await r.text();throw new Error(t);}
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    const reply=(d.content||[]).map(b=>b.text||"").join("");
    CV[cid].push({role:"assistant",content:reply});
  }catch(e){
    CV[cid].pop();
    const err=document.createElement("div");err.className="errmsg";
    err.textContent="Could not reach advisor: "+e.message.substring(0,100);
    c.appendChild(err);
  }
  const ti=document.getElementById("TI");if(ti)ti.remove();
  rMsgs();btn.disabled=false;btn.textContent="↑";updB();
}

function clr(){CV[cid]=[];rMsgs();}
function rz(){const t=document.getElementById("ui");t.style.height="auto";t.style.height=Math.min(t.scrollHeight,90)+"px";}
function updB(){
  const btn=document.getElementById("sb");
  const a=AV.find(x=>x.id===cid);
  const has=document.getElementById("ui").value.trim().length>0;
  btn.disabled=!has;
  btn.style.background=has?a.ac:"rgba(255,255,255,0.07)";
  btn.style.color=has?"#111009":"rgba(237,229,212,0.3)";
}
document.getElementById("ui").addEventListener("input",()=>{rz();updB();});
document.getElementById("ui").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(!document.getElementById("sb").disabled)send();}});
rSB();rMsgs();
</script>
</body>
</html>
