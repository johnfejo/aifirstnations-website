<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI First Nations – Advisory Board</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
:root{--earth:#111009;--smoke:#1e1b10;--bark:#2e2910;--ember:#bf5417;--gold:#c9a24a;--mist:#7aab82;--cream:#ede5d4;--pale:#f8f3ea;}
body{background:var(--earth);color:var(--cream);font-family:'DM Sans',sans-serif;font-weight:300;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.top-nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:rgba(17,16,9,0.95);border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);}
.nav-back{font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--cream);opacity:0.55;text-decoration:none;border:1px solid rgba(255,255,255,0.12);padding:0.4rem 1rem;}
.nav-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--cream);opacity:0.8;}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:260px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.07);background:rgba(17,16,9,0.6);overflow-y:auto;padding:1.2rem 0.9rem;display:flex;flex-direction:column;gap:0.5rem;}
.sidebar-label{font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;opacity:0.35;padding:0 0.4rem 0.5rem;}
.advisor-btn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:14px 13px;cursor:pointer;text-align:left;transition:all 0.2s;width:100%;}
.advisor-btn:hover{background:rgba(255,255,255,0.06);}
.advisor-btn-inner{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.advisor-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.advisor-name{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--cream);font-weight:600;line-height:1.2;}
.advisor-role{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.5;margin-top:2px;}
.advisor-tagline{font-size:11px;color:rgba(237,229,212,0.55);line-height:1.5;font-style:italic;}
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{padding:1rem 1.8rem;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:70px;}
.chat-header-left{display:flex;align-items:center;gap:14px;}
.chat-header-icon{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.chat-header-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;}
.chat-header-tag{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.6;margin-top:3px;}
.clear-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(237,229,212,0.55);padding:5px 14px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;display:none;}
.messages{flex:1;overflow-y:auto;padding:1.8rem;}
.empty-state{text-align:center;padding:2rem 1rem 2.5rem;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:2rem;}
.empty-icon{font-size:44px;margin-bottom:14px;}
.empty-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;margin-bottom:6px;}
.empty-tagline{font-size:13px;opacity:0.55;max-width:380px;margin:0 auto;line-height:1.7;font-style:italic;}
.starters-label{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;opacity:0.35;margin-bottom:12px;}
.starters{display:flex;flex-direction:column;gap:7px;}
.starter-btn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:11px 15px;color:rgba(237,229,212,0.7);font-size:13px;cursor:pointer;text-align:left;line-height:1.5;transition:all 0.2s;font-family:'DM Sans',sans-serif;width:100%;}
.bubble-row{display:flex;margin-bottom:14px;gap:9px;align-items:flex-start;}
.bubble-row.user{justify-content:flex-end;}
.bubble-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px;}
.bubble-user-avatar{background:rgba(201,162,74,0.2);border:1px solid rgba(201,162,74,0.35);color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:14px;}
.bubble-text{max-width:78%;padding:13px 16px;font-size:14px;line-height:1.75;white-space:pre-wrap;}
.bubble-user{background:rgba(201,162,74,0.12);border:1px solid rgba(201,162,74,0.25);border-radius:14px 3px 14px 14px;color:var(--cream);}
.bubble-assistant{border-radius:3px 14px 14px 14px;}
.typing-dots{display:flex;gap:5px;align-items:center;padding:14px 18px;}
.dot{width:7px;height:7px;border-radius:50%;animation:dotPulse 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes dotPulse{0%,80%,100%{opacity:0.3;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}
.error-msg{background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);border-radius:9px;padding:11px 15px;font-size:13px;color:#e74c3c;margin-bottom:14px;}
.input-area{padding:1rem 1.8rem 1.2rem;border-top:1px solid rgba(255,255,255,0.07);background:rgba(17,16,9,0.5);flex-shrink:0;}
.input-box{display:flex;gap:10px;align-items:flex-end;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:13px;padding:10px 14px;}
#userInput{flex:1;background:none;border:none;outline:none;color:var(--cream);font-size:14px;line-height:1.6;resize:none;font-family:'DM Sans',sans-serif;font-weight:300;max-height:100px;overflow-y:auto;}
#userInput::placeholder{color:rgba(237,229,212,0.3);}
#sendBtn{width:36px;height:36px;border-radius:9px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all 0.2s;flex-shrink:0;background:rgba(255,255,255,0.07);color:rgba(237,229,212,0.4);}
#sendBtn:disabled{cursor:not-allowed;}
.input-hint{font-size:10px;opacity:0.25;text-align:center;margin-top:7px;letter-spacing:0.06em;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-brand">AI First Nations</div>
  <div class="nav-title">Advisory Board</div>
  <a href="index.html" class="nav-back">← Back to Site</a>
</nav>
<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-label">Select Advisor</div>
  </div>
  <div class="chat-panel">
    <div class="chat-header" id="chatHeader">
      <div class="chat-header-left">
        <div class="chat-header-icon" id="headerIcon"></div>
        <div>
          <div class="chat-header-name" id="headerName"></div>
          <div class="chat-header-tag" id="headerTag"></div>
        </div>
      </div>
      <button class="clear-btn" id="clearBtn" onclick="clearChat()">Clear chat</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-box" id="inputBox">
        <textarea id="userInput" rows="1" placeholder="Ask your advisor anything about AI First Nations…"></textarea>
        <button id="sendBtn" disabled onclick="sendMessage()">↑</button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>
</div>
<script>
const ADVISORS = [
  {id:"contrarian",name:"The Contrarian",role:"Devil's Advocate",emoji:"⚡",accent:"#E74C3C",bg:"rgba(192,57,43,0.12)",border:"rgba(192,57,43,0.35)",tagline:"Finds the flaw before your competitors do",
  system:"You are The Contrarian advisor for AI First Nations, an Indigenous-led environmental technology organisation founded by John Fejo in Innisfail, Far North Queensland. Challenge assumptions, find weaknesses, stress-test ideas. Key knowledge: RMIT mangrove AI (97% accuracy, 98.96% binary detection, EfficientNet-B0), AATT Government trial (1000+ students, 5 states), Cape York road trip, Torres Strait marine debris, Jarramali rock art, KJR partnerships, John's background (Larrakia man, drone pilot RePL/ReOC, Head Ranger Coordinator, cultural ambassador). Style: Direct, sharp, 3-4 paragraphs, end with a pointed question."},
  {id:"firstprinciples",name:"First Principles",role:"Systems Thinker",emoji:"🔬",accent:"#2E86C1",bg:"rgba(26,82,118,0.12)",border:"rgba(46,134,193,0.35)",tagline:"Strips everything back and rebuilds from truth",
  system:"You are the First Principles advisor for AI First Nations, founded by John Fejo in Innisfail, Far North Queensland. Strip away assumptions, rebuild from fundamental truths. Key knowledge: RMIT mangrove AI (97% accuracy, 98.96% binary detection), AATT Government trial (1000+ students, 5 states), Cape York road trip, Torres Strait marine debris, Jarramali rock art, KJR partnerships, John's background (Larrakia man, drone pilot, Head Ranger Coordinator). Style: Analytical, structured, 3-4 paragraphs, find unconventional insights."},
  {id:"expansionist",name:"The Expansionist",role:"Growth Strategist",emoji:"🌏",accent:"#27AE60",bg:"rgba(30,132,73,0.12)",border:"rgba(39,174,96,0.35)",tagline:"Always thinking bigger, broader, bolder",
  system:"You are The Expansionist advisor for AI First Nations, founded by John Fejo in Innisfail, Far North Queensland. See the biggest version of every opportunity. Think nationally and internationally. Key knowledge: RMIT mangrove AI (97% accuracy), AATT Government trial (1000+ students, 5 states), Cape York road trip, Torres Strait marine debris, Jarramali rock art, KJR partnerships, Southeast Asia and Pacific expansion vision, growth phases (Foundation → Regional → National/International). Style: Energising, specific, bold, 3-4 paragraphs."},
  {id:"outsider",name:"The Outsider",role:"Fresh Perspective",emoji:"👁",accent:"#8E44AD",bg:"rgba(108,52,131,0.12)",border:"rgba(142,68,173,0.35)",tagline:"No assumptions — completely fresh eyes",
  system:"You are The Outsider advisor for AI First Nations, founded by John Fejo in Innisfail, Far North Queensland. See the organisation as a complete stranger would — no assumptions, no cultural bias. Key knowledge: RMIT mangrove AI (97% accuracy), AATT Government trial (1000+ students), Cape York road trip, Torres Strait marine debris, Jarramali rock art, KJR partnerships, John's background (Larrakia man, drone pilot, Head Ranger). Style: Honest, clear, occasionally blunt, 3-4 paragraphs."},
  {id:"executor",name:"The Executor",role:"Action Strategist",emoji:"⚙️",accent:"#CA6F1E",bg:"rgba(147,81,22,0.12)",border:"rgba(202,111,30,0.35)",tagline:"Turns vision into action — who, what, by when",
  system:"You are The Executor advisor for AI First Nations, founded by John Fejo in Innisfail, Far North Queensland. Pure execution — convert ideas into action. Key knowledge: RMIT mangrove AI (97% accuracy), AATT Government trial (1000+ students), Cape York road trip, Torres Strait marine debris, Jarramali rock art, KJR partnerships, John's background (drone pilot, Head Ranger Coordinator). Style: Brief, numbered, ruthlessly practical, assign owners and deadlines."},
  {id:"chairman",name:"The Chairman",role:"Strategic Authority",emoji:"🦅",accent:"#C9A24A",bg:"rgba(125,102,8,0.15)",border:"rgba(201,162,74,0.4)",tagline:"The senior voice — weighs everything, makes the call",
  system:"You are The Chairman of the AI First Nations Advisory Board. AI First Nations is an Indigenous-led environmental technology organisation founded by John Fejo, a Larrakia man, in Innisfail, Far North Queensland. Most senior voice in the room. Key knowledge: RMIT mangrove AI (97% species accuracy, 98.96% binary detection, EfficientNet-B0, team: Kirtan Shah, Thomas Blanks, Jake Dyl, Dr Damiano Spina), AATT Government trial (60+ technologies, 48 vendors, 1000+ students, 5 states, KJR), Cape York road trip (Cooktown to Mapoon), Torres Strait marine debris (Salty Monkeys, KJR), Jarramali rock art, Northern Australia Biosecurity Network, Datathon Ambassador, John's background (Larrakia man, drone pilot RePL/ReOC No.1252905, Head Ranger Coordinator NT and QLD, cultural ambassador, registered minister), 3 pillars (Creation, Connection, Contribution), 5 Cultural Governance pillars, Numuluk Shield, 6 Seasons Methodology, named programs (Ngarrakan Ngardiji, Numuluk, Yumani Ngardiji, Barrwa Ngardiji, Wungal Ngardiji, Larrakia Wanggaman), growth phases, KJR (Dr Kelvin Ross, Aaron Bell). Style: Gravitas and warmth, weigh all perspectives, clear decisive recommendation, 4 paragraphs max."}
];

let currentId="chairman";
const convos={};
ADVISORS.forEach(a=>convos[a.id]=[]);
const STARTERS=["What is the single biggest opportunity for AI First Nations right now?","Should we prioritise the mangrove AI system or education programs first?","How do we approach Southeast Asian expansion?","What is the biggest risk facing AI First Nations?","How do we turn the RMIT research into commercial contracts?","What should John focus on in the next 90 days?","How do we protect Indigenous data sovereignty?","What does success look like in 5 years?"];

function init(){renderSidebar();selectAdvisor("chairman");}

function renderSidebar(){
  const sb=document.getElementById("sidebar");
  const lbl=sb.querySelector(".sidebar-label");
  sb.innerHTML="";sb.appendChild(lbl);
  ADVISORS.forEach(a=>{
    const btn=document.createElement("button");
    btn.className="advisor-btn"+(a.id===currentId?" active":"");
    btn.style.borderColor=a.id===currentId?a.border:"";
    btn.style.background=a.id===currentId?a.bg:"";
    btn.onclick=()=>selectAdvisor(a.id);
    btn.innerHTML=`<div class="advisor-btn-inner"><div class="advisor-icon" style="background:${a.id===currentId?a.accent:"rgba(255,255,255,0.07)"};border:1px solid ${a.id===currentId?a.accent:"rgba(255,255,255,0.1)"};">${a.emoji}</div><div><div class="advisor-name" style="color:${a.id===currentId?a.accent:"var(--cream)"};">${a.name}</div><div class="advisor-role">${a.role}</div></div></div><div class="advisor-tagline">${a.tagline}</div>`;
    sb.appendChild(btn);
  });
}

function selectAdvisor(id){
  currentId=id;
  const a=ADVISORS.find(x=>x.id===id);
  renderSidebar();
  const hi=document.getElementById("headerIcon");
  hi.textContent=a.emoji;hi.style.background=a.accent;
  document.getElementById("headerName").textContent=a.name;
  document.getElementById("headerName").style.color=a.accent;
  document.getElementById("headerTag").textContent=a.tagline;
  document.getElementById("chatHeader").style.background=a.bg;
  renderMessages();
}

function renderMessages(){
  const a=ADVISORS.find(x=>x.id===currentId);
  const convo=convos[currentId];
  const c=document.getElementById("messages");
  c.innerHTML="";
  const cb=document.getElementById("clearBtn");
  if(convo.length===0){cb.style.display="none";renderEmpty(a,c);}
  else{cb.style.display="block";convo.forEach(m=>renderBubble(m,a,c));}
  c.scrollTop=c.scrollHeight;
}

function renderEmpty(a,c){
  const el=document.createElement("div");
  el.innerHTML=`<div class="empty-state"><div class="empty-icon">${a.emoji}</div><div class="empty-name" style="color:${a.accent};">${a.name}</div><div class="empty-tagline">${a.tagline}</div></div><div class="starters-label">Try asking…</div><div class="starters" id="starterList"></div>`;
  c.appendChild(el);
  const list=document.getElementById("starterList");
  STARTERS.forEach(s=>{
    const btn=document.createElement("button");
    btn.className="starter-btn";btn.textContent=s;
    btn.onmouseenter=()=>{btn.style.background=a.bg;btn.style.borderColor=a.border;btn.style.color="var(--cream)";};
    btn.onmouseleave=()=>{btn.style.background="";btn.style.borderColor="";btn.style.color="";};
    btn.onclick=()=>{document.getElementById("userInput").value=s;autoResize();updateBtn();document.getElementById("userInput").focus();};
    list.appendChild(btn);
  });
}

function renderBubble(msg,a,c){
  const row=document.createElement("div");
  row.className="bubble-row"+(msg.role==="user"?" user":"");
  if(msg.role==="assistant"){const av=document.createElement("div");av.className="bubble-avatar";av.style.background=a.accent;av.textContent=a.emoji;row.appendChild(av);}
  const b=document.createElement("div");
  b.className="bubble-text "+(msg.role==="user"?"bubble-user":"bubble-assistant");
  if(msg.role==="assistant"){b.style.background=a.bg;b.style.border=`1px solid ${a.border}`;}
  b.textContent=msg.content;row.appendChild(b);
  if(msg.role==="user"){const av=document.createElement("div");av.className="bubble-avatar bubble-user-avatar";av.textContent="J";row.appendChild(av);}
  c.appendChild(row);
}

function renderTyping(a){
  const c=document.getElementById("messages");
  const row=document.createElement("div");row.className="bubble-row";row.id="typing-indicator";
  const av=document.createElement("div");av.className="bubble-avatar";av.style.background=a.accent;av.textContent=a.emoji;row.appendChild(av);
  const b=document.createElement("div");b.className="bubble-text bubble-assistant";b.style.background=a.bg;b.style.border=`1px solid ${a.border}`;
  b.innerHTML=`<div class="typing-dots"><div class="dot" style="background:${a.accent}"></div><div class="dot" style="background:${a.accent}"></div><div class="dot" style="background:${a.accent}"></div></div>`;
  row.appendChild(b);c.appendChild(row);c.scrollTop=c.scrollHeight;
}

function removeTyping(){const el=document.getElementById("typing-indicator");if(el)el.remove();}
async function sendMessage(){
  const input=document.getElementById("userInput");
  const text=input.value.trim();
  if(!text)return;
  const a=ADVISORS.find(x=>x.id===currentId);
  const btn=document.getElementById("sendBtn");
  input.value="";input.style.height="auto";
  btn.disabled=true;btn.textContent="⏳";
  convos[currentId].push({role:"user",content:text});
  renderMessages();renderTyping(a);
  const errEl=document.getElementById("errorMsg");
  if(errEl)errEl.remove();
  try{
    const p1="sk-ant-api03-upPWt8N-n16b";
    const p2="mTiJG8u_895dX5jLUjekHro8uWvKHd";
    const p3="PBgwhNkfl9hDiWHKLO91TZKprVjVPjc7lJUPrV1TGxDQ-0dipqwAA";
    const KEY=p1+p2+p3;
    const response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":KEY,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system:a.system,
        messages:convos[currentId]
      })
    });
    if(!response.ok){const t=await response.text();console.error("API error:",response.status,t);throw new Error(t);}
    const data=await response.json();
    if(data.error)throw new Error(data.error.message);
    const reply=(data.content||[]).map(b=>b.text||"").join("")||"No response.";
    convos[currentId].push({role:"assistant",content:reply});
  }catch(e){
    console.error("Error:",e);
    convos[currentId].pop();
    removeTyping();
    const c=document.getElementById("messages");
    const err=document.createElement("div");
    err.className="error-msg";err.id="errorMsg";
    err.textContent="Could not reach advisor. Please try again.";
    c.appendChild(err);c.scrollTop=c.scrollHeight;
    btn.disabled=false;btn.textContent="↑";updateBtn();
    return;
  }
  removeTyping();renderMessages();
  btn.disabled=false;btn.textContent="↑";updateBtn();
}

function clearChat(){convos[currentId]=[];renderMessages();}

function autoResize(){
  const ta=document.getElementById("userInput");
  ta.style.height="auto";
  ta.style.height=Math.min(ta.scrollHeight,100)+"px";
}

function updateBtn(){
  const btn=document.getElementById("sendBtn");
  const a=ADVISORS.find(x=>x.id===currentId);
  const has=document.getElementById("userInput").value.trim().length>0;
  btn.disabled=!has;
  if(has){btn.style.background=a.accent;btn.style.color="#111009";}
  else{btn.style.background="rgba(255,255,255,0.07)";btn.style.color="rgba(237,229,212,0.3)";}
}

document.getElementById("userInput").addEventListener("input",()=>{autoResize();updateBtn();});
document.getElementById("userInput").addEventListener("keydown",(e)=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(!document.getElementById("sendBtn").disabled)sendMessage();}
});

init();
</script>
</body>
</html>
