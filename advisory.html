<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advisory Board | AI First Nations</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--earth:#111009;--smoke:#1e1b10;--gold:#c9a24a;--mist:#7aab82;--cream:#ede5d4;--ember:#bf5417;}
body{background:var(--earth);color:var(--cream);font-family:"DM Sans",sans-serif;min-height:100vh;}
#gate{position:fixed;inset:0;background:var(--earth);display:flex;align-items:center;justify-content:center;z-index:999;}
#content{display:none;}
nav{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:#0d0c07;border-bottom:1px solid rgba(255,255,255,0.07);position:sticky;top:0;z-index:50;}
.brand{font-family:"Cormorant Garamond",serif;font-size:0.9rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:0.6rem;}
.brand img{height:36px;}
.back{font-size:0.68rem;color:rgba(237,229,212,0.5);text-decoration:none;border:1px solid rgba(255,255,255,0.1);padding:0.3rem 0.8rem;}
.hdr{padding:2rem;background:linear-gradient(160deg,#2a4228,var(--smoke));}
.hdr h1{font-family:"Cormorant Garamond",serif;font-size:2rem;font-weight:300;color:#f8f3ea;margin-bottom:0.3rem;}
.hdr p{font-size:0.85rem;opacity:0.6;}
.qbox{padding:1.5rem 2rem;background:var(--smoke);border-bottom:1px solid rgba(255,255,255,0.07);}
.ql{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:0.6rem;}
.qr{display:flex;gap:0.8rem;}
.qi{flex:1;background:var(--earth);border:1px solid rgba(255,255,255,0.12);color:var(--cream);padding:0.85rem 1rem;font-family:"DM Sans",sans-serif;font-size:0.9rem;outline:none;resize:none;}
.qi:focus{border-color:var(--gold);}
.ab{background:var(--ember);color:#f8f3ea;border:none;padding:0.85rem 1.5rem;font-family:"DM Sans",sans-serif;font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;}
.ab:disabled{background:rgba(255,255,255,0.07);color:rgba(237,229,212,0.3);cursor:not-allowed;}
.rp{margin:1.5rem 2rem;background:var(--smoke);border:1px solid rgba(255,255,255,0.08);display:none;}
.rp.on{display:block;}
.rh{padding:1rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:0.8rem;}
.ri{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;}
.rn{font-family:"Cormorant Garamond",serif;font-size:1.1rem;font-weight:600;}
.rb{padding:1.5rem 2rem;font-size:0.9rem;line-height:1.85;white-space:pre-wrap;}
.rq{padding:0.7rem 2rem;border-top:1px solid rgba(255,255,255,0.05);font-size:0.75rem;opacity:0.4;font-style:italic;}
.cb{margin-left:auto;background:none;border:1px solid rgba(255,255,255,0.1);color:rgba(237,229,212,0.4);padding:0.3rem 0.8rem;font-size:0.65rem;cursor:pointer;font-family:"DM Sans",sans-serif;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.8rem;padding:1.5rem 2rem;}
.card{background:var(--smoke);border:1px solid rgba(255,255,255,0.08);padding:1rem;cursor:pointer;transition:transform 0.2s;}
.card:hover{transform:translateY(-2px);}
.ct{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.5rem;}
.ci{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;}
.cn{font-family:"Cormorant Garamond",serif;font-size:0.9rem;font-weight:600;}
.cg{font-size:0.74rem;opacity:0.55;line-height:1.4;font-style:italic;margin-bottom:0.5rem;}
.cs{display:flex;align-items:center;gap:0.4rem;font-size:0.68rem;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);}
.dot.spin{background:var(--gold);animation:p 1s infinite;}
.dot.done{background:var(--mist);}
.dot.err{background:#e74c3c;}
@keyframes p{0%,100%{opacity:0.3;}50%{opacity:1;}}
.prev{font-size:0.72rem;opacity:0.5;margin-top:0.4rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.sq{padding:0 2rem 2rem;}
.sgl{font-size:0.65rem;letter-spacing:0.16em;text-transform:uppercase;opacity:0.3;margin-bottom:0.7rem;}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:0.5rem;}
.sb{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);padding:0.7rem 0.9rem;font-size:0.78rem;color:rgba(237,229,212,0.6);cursor:pointer;text-align:left;font-family:"DM Sans",sans-serif;line-height:1.4;}
.sb:hover{background:rgba(201,162,74,0.07);color:var(--cream);}
@media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr);}.sg{grid-template-columns:1fr;}.qr{flex-direction:column;}}
</style>
</head>
<body>
<div id="gate"><p style="font-family:Cormorant Garamond,serif;color:#c9a24a;opacity:0.7;">Verifying...</p></div>
<div id="content">
<nav>
  <div class="brand"><img src="images/logo.jpg" alt="">AI First Nations</div>
  <a href="portal.html" class="back">Back to Portal</a>
</nav>
<div class="hdr">
  <h1>Board of Nine Advisors</h1>
  <p>Ask one question. All 9 respond simultaneously. Click any card to read their answer.</p>
</div>
<div class="qbox">
  <span class="ql">Ask the Board</span>
  <div class="qr">
    <textarea class="qi" id="Q" rows="2" placeholder="Type your question for all 9 advisors..."></textarea>
    <button class="ab" id="AB" onclick="ask()">Ask the Board</button>
  </div>
</div>
<div class="rp" id="RP">
  <div class="rh" id="RH">
    <div class="ri" id="RI"></div>
    <div><div class="rn" id="RN"></div><div style="font-size:0.68rem;opacity:0.5;" id="RR"></div></div>
    <button class="cb" onclick="closeR()">Close</button>
  </div>
  <div class="rb" id="RB"></div>
  <div class="rq" id="RQ"></div>
</div>
<div class="grid" id="G"></div>
<div class="sq"><div class="sgl">Suggested questions</div><div class="sg" id="SG"></div></div>
</div>
<script>
(function(){if(sessionStorage.getItem("aifn_portal")==="granted"){document.getElementById("gate").style.display="none";document.getElementById("content").style.display="block";}else{setTimeout(function(){window.location.href="index.html";},1200);}})();
var B=[
{id:"chairman",n:"Chairman",e:"🦅",ac:"#c9a24a",bg:"rgba(125,102,8,0.15)",br:"rgba(201,162,74,0.4)",g:"Senior voice — weighs everything",s:"You are The Chairman of AI First Nations Advisory Board, founded by John Fejo (Larrakia man) Innisfail QLD. Senior strategic voice. Know: RMIT mangrove AI 97% EfficientNet-B0 Kirtan Shah Thomas Blanks Jake Dyl Dr Damiano Spina, AATT 1000+ students 5 states KJR, Cape York Cooktown-Mapoon, Torres Strait Salty Monkeys, Jarramali rock art, John drone pilot RePL/ReOC 1252905 Head Ranger NT QLD cultural ambassador minister, 3 pillars Creation Connection Contribution, 5 Cultural Governance pillars, Numuluk Shield. Gravitas, warm, decisive. 3-4 paragraphs."},
{id:"ceo",n:"The CEO",e:"🌏",ac:"#c9a24a",bg:"rgba(125,102,8,0.18)",br:"rgba(201,162,74,0.45)",g:"Walks in both worlds — Western and First Nations",s:"You are CEO Advisor for AI First Nations, founded by John Fejo (Larrakia man) Innisfail QLD. Walk in both worlds — Western corporate AND Indigenous First Nations. Technology bridges both. Know: RMIT mangrove AI 97%, AATT 1000+ students KJR, Cape York, Torres Strait, John drone pilot RePL/ReOC Head Ranger cultural ambassador minister, Numuluk Shield 3 pillars 5 Cultural Governance pillars. Show how both worlds apply. 3-4 paragraphs."},
{id:"contrarian",n:"Contrarian",e:"⚡",ac:"#E74C3C",bg:"rgba(192,57,43,0.12)",br:"rgba(192,57,43,0.35)",g:"Finds the flaw first",s:"You are The Contrarian for AI First Nations, founded by John Fejo (Larrakia man) Innisfail QLD. Challenge assumptions, find weaknesses. Know: RMIT mangrove AI 97%, AATT 1000+ students, Cape York, Torres Strait, KJR, John drone pilot Head Ranger. Direct, sharp. 3 paragraphs, end with pointed question."},
{id:"expansionist",n:"Expansionist",e:"🌐",ac:"#27AE60",bg:"rgba(30,132,73,0.12)",br:"rgba(39,174,96,0.35)",g:"Always thinking bigger",s:"You are The Expansionist for AI First Nations, founded by John Fejo Innisfail QLD. Think nationally and internationally. Know: RMIT mangrove AI 97%, AATT, Cape York, Torres Strait, Southeast Asia Pacific expansion, KJR. Energising, concrete expansion paths. 3 paragraphs."},
{id:"outsider",n:"Outsider",e:"👁",ac:"#8E44AD",bg:"rgba(108,52,131,0.12)",br:"rgba(142,68,173,0.35)",g:"No assumptions — fresh eyes",s:"You are The Outsider for AI First Nations, founded by John Fejo Innisfail QLD. Fresh eyes, no assumptions. Know: RMIT mangrove AI 97%, AATT, Cape York, Torres Strait, KJR, John Larrakia man drone pilot Head Ranger. Honest, clear. 3 paragraphs."},
{id:"executor",n:"Executor",e:"⚙️",ac:"#CA6F1E",bg:"rgba(147,81,22,0.12)",br:"rgba(202,111,30,0.35)",g:"Who, what, by when",s:"You are The Executor for AI First Nations, founded by John Fejo Innisfail QLD. Pure execution. Who does what by when. Know: RMIT mangrove AI 97%, AATT, Cape York, Torres Strait, KJR, John drone pilot Head Ranger. Numbered steps, owners, deadlines. 3 paragraphs."},
{id:"firstprinciples",n:"First Principles",e:"🔬",ac:"#2E86C1",bg:"rgba(26,82,118,0.12)",br:"rgba(46,134,193,0.35)",g:"Rebuilds from truth",s:"You are First Principles advisor for AI First Nations, founded by John Fejo Innisfail QLD. Strip assumptions, rebuild from truth. Know: RMIT mangrove AI 97%, AATT, Cape York, Torres Strait, KJR, John drone pilot Head Ranger. Find core truth, unconventional insight. 3 paragraphs."},
{id:"manager",n:"Manager",e:"📊",ac:"#7aab82",bg:"rgba(42,66,40,0.15)",br:"rgba(122,171,130,0.35)",g:"People, partnerships, operations",s:"You are The Manager for AI First Nations, founded by John Fejo (Larrakia man) Innisfail QLD. Focus on people, relationships, partnerships, operational health. Who needs to know, who needs to be involved. Know: RMIT team Kirtan Shah Thomas Blanks Jake Dyl, KJR Dr Kelvin Ross Aaron Bell, Torres Strait Dennis Fay Salty Monkeys, John community relationships FNQ NT. Practical, people-focused. 3 paragraphs."},
{id:"financial",n:"Financial Advisor",e:"💰",ac:"#F39C12",bg:"rgba(243,156,18,0.1)",br:"rgba(243,156,18,0.3)",g:"Revenue, grants, cash flow",s:"You are Financial Advisor for AI First Nations ABN 80732478065, founded by John Fejo Innisfail QLD. Advise on revenue, grants, cash flow, pricing, risk, growth. Know: drone survey contracts, mangrove AI commercialisation blue carbon markets, RMIT partnership, CASA credentials, insurance. Grants: DCCEEW NIAA AIATSIS blue carbon. Clear financial thinking, specific numbers. 3 paragraphs."}
];
var RS={};var CQ="";
var QS=["What is the biggest opportunity for AI First Nations right now?","Mangrove AI commercialisation or education expansion — which first?","How do we protect our IP and data sovereignty?","What does success look like in 5 years?","How do we approach Southeast Asian and Pacific expansion?","What should John focus on in the next 90 days?","How do we turn RMIT research into commercial contracts?","What are the biggest financial risks and opportunities?","How do we build the right team and partnerships?","How do we ensure AI First Nations walks in both worlds?"];
function init(){
  var sg=document.getElementById("SG");
  QS.forEach(function(q){var b=document.createElement("button");b.className="sb";b.textContent=q;b.onclick=function(){document.getElementById("Q").value=q;};sg.appendChild(b);});
  render();
}
function render(){
  var g=document.getElementById("G");g.innerHTML="";
  B.forEach(function(a){
    var h=RS[a.id]&&RS[a.id]!=="loading"&&RS[a.id]!=="error";
    var c=document.createElement("div");c.className="card";c.id="C"+a.id;
    if(h||RS[a.id]==="loading")c.style.borderColor=a.br;
    c.onclick=function(){openR(a.id);};
    var st="",pv="";
    if(!CQ){st='<span class="dot"></span><span style="opacity:0.3;font-size:0.68rem;">Waiting</span>';}
    else if(RS[a.id]==="loading"){st='<span class="dot spin"></span><span style="opacity:0.65;font-size:0.68rem;color:#c9a24a;">Thinking...</span>';}
    else if(RS[a.id]==="error"){st='<span class="dot err"></span><span style="font-size:0.68rem;color:#e74c3c;">Error</span>';}
    else if(h){st='<span class="dot done"></span><span style="opacity:0.7;font-size:0.68rem;color:#7aab82;">Ready — click to read</span>';pv='<div class="prev">'+RS[a.id].substring(0,100)+'...</div>';}
    c.innerHTML='<div class="ct"><div class="ci" style="background:'+a.ac+'">'+a.e+'</div><div class="cn" style="color:'+a.ac+'">'+a.n+'</div></div><div class="cg">'+a.g+'</div><div class="cs">'+st+'</div>'+pv;
    g.appendChild(c);
  });
}
function ask(){
  var q=document.getElementById("Q").value.trim();if(!q)return;
  CQ=q;document.getElementById("RP").classList.remove("on");
  B.forEach(function(a){RS[a.id]="loading";});render();
  var btn=document.getElementById("AB");btn.disabled=true;btn.textContent="Thinking...";
  var done=0;
  B.forEach(function(a){
    callAPI(a.s,[{role:"user",content:q}],function(r){RS[a.id]=r;done++;render();if(done===B.length){btn.disabled=false;btn.textContent="Ask the Board";}},function(){RS[a.id]="error";done++;render();if(done===B.length){btn.disabled=false;btn.textContent="Ask the Board";}});
  });
}
function openR(id){
  var a=B.find(function(x){return x.id===id;});var s=RS[id];
  if(!s||s==="loading"||s==="error")return;
  document.getElementById("RI").textContent=a.e;document.getElementById("RI").style.background=a.ac;
  document.getElementById("RN").textContent=a.n;document.getElementById("RN").style.color=a.ac;
  document.getElementById("RR").textContent=a.g;document.getElementById("RH").style.background=a.bg;
  document.getElementById("RB").textContent=s;document.getElementById("RQ").textContent="Q: "+CQ;
  document.getElementById("RP").style.borderColor=a.br;document.getElementById("RP").classList.add("on");
  document.getElementById("RP").scrollIntoView({behavior:"smooth",block:"nearest"});
}
function closeR(){document.getElementById("RP").classList.remove("on");}
function callAPI(sys,msgs,ok,fail){
  var k="sk-ant-api03-wvRsUFYager"+"Cz8uNWnkAKDK-0CLXQMI-V9BUM"+"FNbSpC9eJmxjJSu8x-kJKAWEuJOZmloF8P5tW-J2cnkUwfqZg-NZ8o5AAA";
  fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-opus-4-8",max_tokens:800,system:sys,messages:msgs})}).then(function(r){return r.json();}).then(function(d){if(d.error)fail();else ok((d.content||[]).map(function(b){return b.text||"";}).join(""));}).catch(fail);
}
document.getElementById("Q").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();ask();}});
init();
</script>
</body>
</html>
